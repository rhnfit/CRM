name: CI

# Use Node 24 for JS-based actions (checkout, setup-node) per
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Must be quoted: unquoted URLs break YAML parsing so DATABASE_URL is not set.
  DATABASE_URL: 'postgresql://postgres:postgres@127.0.0.1:5432/ci?schema=public'

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Verify backend
        run: npm run verify
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@127.0.0.1:5432/ci?schema=public'

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run verify
